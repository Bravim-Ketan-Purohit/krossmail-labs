# Local dev stack for Kross. Brings up all 7 services plus the backing
# infrastructure they need (Postgres+pgvector, Redis, LocalStack for AWS, Ollama).
# Source of truth for AWS in staging/prod is Terraform — this is local parity only.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kross
      POSTGRES_PASSWORD: kross
      POSTGRES_DB: kross
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kross"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,s3,secretsmanager,kms
      DEBUG: "0"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  auth-service:
    build: ./services/auth-service
    ports: ["3001:8000"]
    depends_on: [postgres, redis, localstack]
    environment:
      DATABASE_URL: postgresql://kross:kross@postgres:5432/kross
      REDIS_URL: redis://redis:6379
      AWS_REGION: us-east-1

  sync-service:
    build: ./services/sync-service
    ports: ["3002:8000"]
    depends_on: [postgres, redis, localstack]
    environment:
      DATABASE_URL: postgresql://kross:kross@postgres:5432/kross
      REDIS_URL: redis://redis:6379
      AWS_REGION: us-east-1

  ai-service:
    build: ./services/ai-service
    ports: ["3003:8000"]
    depends_on: [localstack, ollama]
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      AWS_REGION: us-east-1

  rag-service:
    build: ./services/rag-service
    ports: ["3004:8000"]
    depends_on: [postgres, localstack, ollama]
    environment:
      DATABASE_URL: postgresql://kross:kross@postgres:5432/kross
      OLLAMA_BASE_URL: http://ollama:11434
      AWS_REGION: us-east-1

  calendar-service:
    build: ./services/calendar-service
    ports: ["3005:8000"]
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://kross:kross@postgres:5432/kross
      REDIS_URL: redis://redis:6379

  file-service:
    build: ./services/file-service
    ports: ["3006:8000"]
    depends_on: [postgres, localstack]
    environment:
      DATABASE_URL: postgresql://kross:kross@postgres:5432/kross
      AWS_REGION: us-east-1

  notification-service:
    build: ./services/notification-service
    ports: ["3007:8000"]
    depends_on: [redis, localstack]
    environment:
      REDIS_URL: redis://redis:6379
      AWS_REGION: us-east-1

volumes:
  pgdata:
  ollama:
