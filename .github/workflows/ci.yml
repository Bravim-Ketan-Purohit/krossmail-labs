name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  node:
    name: Frontend — lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests (packages/*)
        run: npm run test --workspaces --if-present
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

  python:
    name: Services — pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - sync-service
          - ai-service
          - rag-service
          - calendar-service
          - file-service
          - notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install deps
        working-directory: services/${{ matrix.service }}
        run: uv sync --frozen
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: uv run pytest

  iac:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform fmt -check -recursive terraform
      - name: Validate staging
        working-directory: terraform/envs/staging
        run: |
          terraform init -backend=false -input=false
          terraform validate
      # Security scanning (tfsec / checkov) runs here once policies are tuned.

  # Trivy image scan + multi-stage docker builds run in the deploy pipeline
  # (staging auto, prod manual gate) — see CLAUDE.md CI/CD section.
